# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "dee783ee7f2d7c6662fe6b2676da35a1"
name = "luxury-tax-app"
application_url = "https://luxury-tax-app-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_inventory,write_inventory,read_orders,read_discounts,write_discounts"

[auth]
redirect_urls = [ "https://luxury-tax-app-production.up.railway.app/auth/callback" ]

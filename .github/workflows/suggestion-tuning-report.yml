name: suggestion-tuning-report

# Monthly autonomous audit of the suggestion tuner. Runs on the 1st of each
# month at 09:13 UTC. Read-only against the repo (no DB access needed):
# parses docs/suggestion-tuning-log.md + app/lib/agent/suggestions.server.ts
# + git log to produce a digestible markdown report at
# docs/suggestion-tuning-report.md, committed by github-actions[bot].
#
# When deterministic anomalies are detected (stuck templates, data drought,
# bot silent for >35 days, catastrophic baseScore drops), opens or updates
# a GitHub Issue labeled `tuning-audit` so the merchant gets a notification
# email via GitHub's default notification flow. No new infra required.
#
# Manually triggerable via the Actions tab (workflow_dispatch).

on:
  schedule:
    - cron: "13 9 1 * *"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need history so `git log --author=github-actions[bot]` works.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        # tsc needs the @prisma/client types to compile any file that imports
        # it (e.g. shared types in the agent dir). The audit script itself
        # does NOT touch the DB.
        run: npx prisma generate

      - name: Render markdown report
        # --silent suppresses npm's own "> audit:tuning ..." banner that
        # would otherwise pollute the captured stdout (jq fails on it
        # downstream; markdown shows it as a stray code block at the top).
        run: npm run --silent audit:tuning > docs/suggestion-tuning-report.md

      - name: Render JSON anomaly summary
        run: npm run --silent audit:tuning -- --json > /tmp/audit.json

      - name: Commit + push report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/suggestion-tuning-report.md
          if git diff --cached --quiet; then
            echo "Report unchanged — skipping commit."
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "audit: monthly suggestion tuning report ($DATE)" \
                       -m "Auto-generated by .github/workflows/suggestion-tuning-report.yml — see docs/suggestion-tuning-report.md."
            git push origin main
          fi

      - name: Open or update anomaly issue if anomalies detected
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ANOMALY_COUNT=$(jq '.anomalies | length' /tmp/audit.json)
          if [ "$ANOMALY_COUNT" = "0" ]; then
            echo "No anomalies — no issue action needed."
            exit 0
          fi

          DATE=$(date +%Y-%m-%d)
          TITLE="Suggestion tuning anomaly detected ($DATE)"

          # Build the issue body from the JSON anomalies list.
          BODY=$(jq -r '
            "Detected " + (.anomalies | length | tostring) + " anomaly/anomalies in the autonomous suggestion tuner.\n\n## Anomalies\n" +
            (.anomalies | map("- `" + .rule + "`" + (if .templateId then " (`" + .templateId + "`)" else "" end) + ": " + .detail) | join("\n")) +
            "\n\n## Summary\n- Tuner runs logged: " + (.summary.totalRuns | tostring) +
            "\n- Last bot commit on main: " + (.summary.lastBotCommitDate // "(none)") +
            "\n- Templates at floor: " + (.summary.templatesAtFloor | tostring) +
            "\n- Templates at cap: " + (.summary.templatesAtCap | tostring) +
            "\n- Cumulative impressions: " + (.summary.cumulativeImpressions | tostring) +
            "\n- Cumulative clicks: " + (.summary.cumulativeClicks | tostring) +
            "\n- Overall CTR: " + ((.summary.overallCtr * 100) | tostring) + "%" +
            "\n\nFull report: [docs/suggestion-tuning-report.md](../blob/main/docs/suggestion-tuning-report.md)"
          ' /tmp/audit.json)

          # Reuse an open issue if one exists; otherwise create a new one.
          EXISTING=$(gh issue list --label tuning-audit --state open --json number --jq '.[0].number' || true)

          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue edit "$EXISTING" --title "$TITLE" --body "$BODY"
            gh issue comment "$EXISTING" --body "Re-checked $DATE — anomalies still present (or new ones detected). See updated description."
          else
            echo "Opening new tuning-audit issue"
            # Create the label if it doesn't exist (idempotent — ignore failure).
            gh label create tuning-audit --color "fbca04" --description "Autonomous tuning audit anomaly" || true
            gh issue create --title "$TITLE" --body "$BODY" --label tuning-audit
          fi

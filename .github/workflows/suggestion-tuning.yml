name: suggestion-tuning

# Fortnightly autonomous tuner for the Copilot's smart-suggestion baseScore
# values. Runs on the 11th and 25th of each month at 09:07 UTC (~14-day
# cadence). Reads SuggestionEvent click data from the Railway DB, applies
# conservative CTR-based rules to edit baseScore values in
# app/lib/agent/suggestions.server.ts, runs typecheck + tests, and commits
# the change to main if anything changed.
#
# Required GitHub secret: DATABASE_URL — paste the Railway Postgres URL
# from Variables tab (same value the web service uses).
#
# Manually triggerable via the Actions tab (workflow_dispatch).

on:
  schedule:
    - cron: "7 9 11,25 * *"
  workflow_dispatch:

jobs:
  tune:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run auto-tuner
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run tune:suggestions

      - name: Verify (typecheck + tests)
        run: |
          npm run typecheck
          npx vitest run

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage only the two files the tuner is allowed to touch.
          git add app/lib/agent/suggestions.server.ts docs/suggestion-tuning-log.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(date +%Y-%m-%d)
          git commit -m "tune: fortnightly suggestion baseScore adjustment ($DATE)" \
                     -m "Auto-generated by .github/workflows/suggestion-tuning.yml — see docs/suggestion-tuning-log.md for the run summary."
          git push origin main
